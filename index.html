<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Otázky</title>
</head>
<body style="text-align:center; font-family:sans-serif; margin-top:50px;">

<h1>Náhodná otázka</h1>
<div id="question">Klikni na tlačidlo</div>

<br><br>

<button onclick="newQuestion()">Nová otázka</button>

<script>
const questions = [
  "1.	Čo dúfaš, že zo seba uvidíš v tvojom (potencialnom) dieťati?",
"2.	Akú vec si si na mne všimla ako prvú?",
"3.	Kedy si naposledy plakal? A prečo?",
"4.	Aká je vaša fráza/slovo ktoré často používate? Je za ňou/ním nejaký príbeh?",
"5.	Ak by si si mohla vybrať meno, ako by si sa volala? ",
"6.	V ktorom outfite sa cítiš najviac sama sebou?",
"7.	Ktorú časť svojho tela máš najradšej?",
"8.	K čomu v živote cítiš najväčšiu vášeň?",
"9.	Čo je pre iných ťažké a pre teba naopak prirodzené?",
"10.	Čo považuješ za svoj najväčší neúspech?",
"11.	Kde sa podľa teba najlepšie plače?",
"12.	Aký je tvoj obľúbený font vo Worde?",
"13.	Čo chceš spraviť vo výchove inak ako robili tvoji rodičia?",
"14.	Čo z toho, ako si bol vychovaný ty by si chcel preniesť do toho ako budeš vychovávať svoje deti?",
"15.	Aký bol tvoj najvážnejší/najhorší fyzický úraz?"

];

function newQuestion() {
  const randomIndex = Math.floor(Math.random() * questions.length);
  document.getElementById("question").innerText = questions[randomIndex];
}
</script>

</body>
</html>
